<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoetbalshirtsNL – Officiële Replica Shirts</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --oranje: #FF5500;
      --oranje-donker: #cc4400;
      --zwart: #0a0a0a;
      --wit: #ffffff;
      --grijs: #f4f4f2;
      --tekst: #1a1a1a;
      --subtitel: #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--wit);
      color: var(--tekst);
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.45rem;
      letter-spacing: -0.5px;
      color: var(--zwart);
      text-decoration: none;
    }
    .logo span { color: var(--oranje); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--tekst);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--oranje); }

    .btn-primary {
      background: var(--oranje);
      color: var(--wit);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, transform 0.15s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 100%, 10px 100%);
    }
    .btn-primary:hover {
      background: var(--oranje-donker);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--tekst);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 2px solid var(--tekst);
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 100%, 10px 100%);
    }
    .btn-secondary:hover {
      background: var(--tekst);
      color: var(--wit);
      transform: translateY(-1px);
    }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 100px 48px 60px;
      position: relative;
      overflow: hidden;
    }

    .hero-badge {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--oranje);
      border: 1.5px solid var(--oranje);
      padding: 5px 14px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 8vw, 7.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero h1 .accent { color: var(--oranje); }

    .hero p {
      font-size: 1.1rem;
      line-height: 1.65;
      color: #555;
      max-width: 440px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    /* HERO VISUAL: 2 shirts naast elkaar, minder ingezoomd */
    .hero-visual {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding-left: 32px;
      animation: fadeIn 0.8s 0.3s ease both;
    }

    .shirt-card {
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 4 / 3;
      transition: transform 0.3s;
    }
    .shirt-card:hover { transform: translateY(-4px); }

    .shirt-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #1a1a1a;
      display: block;
    }

    .shirt-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--oranje);
      color: var(--wit);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
    }

    .ticker {
      background: var(--oranje);
      padding: 14px 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      gap: 0;
      animation: ticker 22s linear infinite;
    }

    .ticker-item {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--wit);
      padding: 0 40px;
    }

    .ticker-item::before {
      content: '◆';
      margin-right: 40px;
      opacity: 0.6;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    .feature {
      padding: 48px 36px;
      border-right: 1px solid #eee;
      transition: background 0.2s;
    }
    .feature:last-child { border-right: none; }
    .feature:hover { background: var(--grijs); }

    .feature-icon {
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .feature h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .feature p {
      font-size: 0.875rem;
      color: #777;
      line-height: 1.6;
    }

    .shirts-section {
      padding: 100px 48px;
    }

    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--oranje);
      margin-bottom: 10px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 5vw, 4rem);
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -1px;
    }

    .shirts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* twee kaarten naast elkaar */
      gap: 24px;
    }

    .product-card {
      background: var(--grijs);
      border-radius: 2px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .product-img {
      background: #1f1f1f;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;  /* minder ingezoomd */
      background: #1f1f1f;
      display: block;
    }

    .product-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,85,0,0.15) 0%, transparent 60%);
    }

    .product-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--oranje);
      color: var(--wit);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      z-index: 1;
    }

    .product-info {
      padding: 24px;
    }

    .product-info h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .product-info .sub {
      font-size: 0.825rem;
      color: #888;
      margin-bottom: 16px;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

      font-family: 'Barlow Condensed', sans-serif;
      font-weight:
