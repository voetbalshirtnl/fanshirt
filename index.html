<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoetbalshirtsNL – Draag oranje met trots</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --oranje: #FF5500;
      --oranje-donker: #cc4400;
      --zwart: #070707;
      --wit: #ffffff;
      --achtergrond: #fff5ec;
      --kaart-rand: #e5e2dc;
      --tekst: #1a1a1a;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Barlow',sans-serif;
      background:var(--achtergrond);
      color:var(--tekst);
    }

    /* TOPNAV: alleen Bestellen / Gripsokken / Over ons */
    header {
      position:fixed; top:0; left:0; right:0; height:68px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,0.97);
      border-bottom:1px solid #eee;
      z-index:100;
    }
    .topnav {
      display:flex;
      gap:64px;
      font-family:'Barlow',sans-serif;
      font-size:0.9rem;
    }
    .topnav a {
      text-decoration:none;
      color:#444;
      font-weight:500;
    }
    .topnav a:hover { color:var(--oranje); }

    main {
      padding:96px 32px 40px;
    }

    /* HERO LAYOUT */
    .hero {
      max-width:1240px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1.1fr) minmax(0,1.1fr);
      gap:40px;
      align-items:center;
    }

    .hero-badge {
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.72rem;
      font-weight:700;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--oranje);
      border:1.5px solid var(--oranje);
      display:inline-block;
      padding:6px 18px;
      margin-bottom:20px;
    }

    .hero-title-line {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;
      font-size:clamp(3rem,5.6vw,4.4rem);
      text-transform:uppercase;
      letter-spacing:-1.5px;
      line-height:0.95;
    }
    .hero-title-line span { color:var(--oranje); }

    .hero-text {
      margin-top:26px;
      font-size:0.98rem;
      color:#555;
      max-width:460px;
      line-height:1.7;
    }

    .hero-actions {
      margin-top:26px;
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:center;
    }

    .btn-primary {
      background:var(--oranje);
      color:var(--wit);
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      letter-spacing:0.14em;
      text-transform:uppercase;
      border:none;
      padding:11px 32px;
      cursor:pointer;
      text-decoration:none;
      font-size:0.9rem;
      clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 100%, 14px 100%);
    }
    .btn-primary:hover { background:var(--oranje-donker); }

    .btn-secondary {
      background:transparent;
      color:var(--zwart);
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      letter-spacing:0.14em;
      text-transform:uppercase;
      border:2px solid var(--zwart);
      padding:9px 26px;
      cursor:pointer;
      text-decoration:none;
      font-size:0.86rem;
      clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 100%, 14px 100%);
    }
    .btn-secondary:hover {
      border-color:var(--oranje);
      color:var(--oranje);
    }

    .hero-note {
      font-size:0.83rem;
      color:#777;
      margin-top:6px;
    }

    /* SHIRT AFBEELDINGEN ZIJDE */
    .hero-images {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }

    .shirt-card {
      background:#111;
      padding:10px;
      border-radius:10px;
      box-shadow:0 18px 40px rgba(0,0,0,0.35);
      position:relative;
    }
    .shirt-card img {
      width:100%;
      height:auto;
      border-radius:6px;
      display:block;
    }
    .shirt-label {
      position:absolute;
      left:10px;
      bottom:10px;
      background:var(--oranje);
      color:#fff;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      font-size:0.75rem;
      letter-spacing:0.16em;
      text-transform:uppercase;
      padding:4px 10px;
    }

    @media(max-width:960px){
      main{padding:86px 18px 32px;}
      .hero{
        grid-template-columns:1fr;
        gap:32px;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav class="topnav">
      <a href="bestellen.html">Bestellen</a>
      <a href="gripsokken.html">Gripsokken</a>
      <a href="over-ons.html">Over ons</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <!-- Linker zijde: tekst -->
      <div>
        <div class="hero-badge">Nederland collectie 2025/26</div>

        <div class="hero-title">
          <div class="hero-title-line">Draag</div>
          <div class="hero-title-line"><span>Oranje</span></div>
          <div class="hero-title-line">met trots</div>
        </div>

        <p class="hero-text">
          Oranje shirts geïnspireerd op het Nederlands elftal. Thuisshirt en uitshirt nu beschikbaar.
          Snel geleverd, scherpe prijs.
        </p>

        <div class="hero-actions">
          <a href="bestellen.html" class="btn-primary">Bestel nu</a>
          <a href="gripsokken.html" class="btn-secondary">Gripsokken</a>
        </div>

        <p class="hero-note">Oranjeshirts vanaf €24,99 – betalen via Tikkie.</p>
      </div>

      <!-- Rechter zijde: thuisshirt + uitshirt -->
      <div class="hero-images">
        <div class="shirt-card">
          <img src="oranje-shirt.jpg" alt="Fan-versie thuisshirt 2026">
          <div class="shirt-label">Thuisshirt</div>
        </div>
        <div class="shirt-card">
          <img src="wit-shirt.jpg" alt="Fan-versie uitshirt 2026">
          <div class="shirt-label">Uitshirt</div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
